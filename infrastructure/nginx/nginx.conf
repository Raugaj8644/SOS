user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;
  gzip_min_length 256;

  # Security headers
  add_header X-Frame-Options        DENY;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection       "1; mode=block";
  add_header Referrer-Policy        strict-origin-when-cross-origin;
  add_header Permissions-Policy     "geolocation=(self)";
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

  # Client body size (file uploads up to 10 MB)
  client_max_body_size 10m;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream: NestJS API ──────────────────────────────────────────────────
  upstream api_upstream {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ── Upstream: Next.js Web ─────────────────────────────────────────────────
  upstream web_upstream {
    least_conn;
    server web:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name cerp.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;

      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── WebSocket ────────────────────────────────────────────────────────
    location /ws/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;  # long-lived WS connections
    }

    # ── Auth rate-limit (strict) ──────────────────────────────────────────
    location /api/v1/auth/login {
      limit_req zone=auth burst=3 nodelay;

      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Next.js static assets ─────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://web_upstream;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    # ── PWA service worker — no cache ─────────────────────────────────────
    location /firebase-messaging-sw.js {
      proxy_pass http://web_upstream;
      add_header Cache-Control "no-store, max-age=0";
    }

    # ── Everything else → Next.js ─────────────────────────────────────────
    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
